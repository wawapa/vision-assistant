<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>視覺語音助理</title>
    <style>
        /* 基礎重置：取消所有留白，禁止雙擊放大 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* 鎖定畫面，防止意外滑動影響盲操 */
        }
        
        /* 增強焦點外框 */
        *:focus {
            outline: 8px solid #ffbf00 !important;
            outline-offset: -8px; /* 往內縮以防破壞滿版版型 */
        }

        /* 第一層：超級主按鈕 (佔據畫面極大部分) */
        #mainActionBtn {
            flex: 6; /* 佔據畫面的 60% 高度 */
            width: 100%;
            background: #ffeb3b; /* 高對比亮黃色 */
            color: #000000;
            font-size: 3.5rem;
            font-weight: 900;
            border: none;
            cursor: pointer;
            transition: background 0.1s;
        }
        #mainActionBtn:active { background: #fbc02d; }
        #mainActionBtn:disabled { background: #555; color: #aaa; }

        /* 第二層：滿版控制列 */
        .controls-row {
            flex: 2; /* 佔據畫面的 20% 高度 */
            display: flex;
            width: 100%;
        }
        .controls-row button {
            flex: 1;
            border: 2px solid #000; /* 按鈕間的黑色分隔線 */
            font-size: 1.6rem;
            font-weight: bold;
            cursor: pointer;
        }
        #speakBtn { background: #81c784; color: #000; }
        #stopBtn { background: #e57373; color: #000; }
        #switchCameraBtn { background: #29b6f6; color: #000; }

        /* 第三層：狀態列 */
        #status {
            flex: 0 0 50px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            background: #333;
        }
        .loading { background: #ffb74d !important; color: #000; }
        .error { background: #ef5350 !important; color: #fff; }
        .success { background: #66bb6a !important; color: #000; }

        /* 第四層：視覺與設定區 (可滑動，平時藏在下面) */
        .info-area {
            flex: 2; /* 剩下高度 */
            width: 100%;
            background: #121212;
            overflow-y: auto; /* 允許往下滑動 */
            padding: 20px;
        }

        /* 預覽框移到底部 */
        video {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 8px;
            background: #000;
            border: 2px solid #4fc3f7;
            margin-bottom: 20px;
        }

        #response {
            background: #2c2c2c;
            padding: 20px;
            border-radius: 8px;
            font-size: 1.4rem;
            line-height: 1.5;
            min-height: 100px;
            margin-bottom: 20px;
        }

        .api-section {
            border-top: 2px solid #444;
            padding-top: 20px;
            margin-bottom: 40px; /* 留一點底部空間 */
        }

        .api-section label {
            display: block;
            color: #ffb74d;
            font-size: 1.2rem;
            margin-bottom: 10px;
            font-weight: bold;
        }

        input[type="password"] {
            width: 100%;
            padding: 20px;
            background: #2c2c2c;
            border: 2px solid #666;
            color: #fff;
            font-size: 1.5rem;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .api-link {
            color: #4fc3f7;
            font-size: 1.2rem;
            display: block;
            margin-bottom: 15px;
        }

        .sr-only {
            position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0;
        }
    </style>
</head>
<body>

    <!-- 盲操第一層：超級主按鈕 -->
    <button id="mainActionBtn" aria-label="拍照並辨識。位於畫面上半部，佔據最大面積">拍照並辨識</button>

    <!-- 盲操第二層：滿版副按鈕 -->
    <div class="controls-row">
        <button id="speakBtn" aria-label="重新朗讀結果。位於畫面中左方">🔊 重聽</button>
        <button id="stopBtn" aria-label="停止朗讀。位於畫面正中間">⏹️ 停止</button>
        <button id="switchCameraBtn" aria-label="切換前後鏡頭。位於畫面中右方">🔄 鏡頭</button>
    </div>

    <!-- 狀態列 -->
    <div id="status" role="status" aria-live="polite">啟動中...</div>

    <!-- 視覺區與設定區：全部移到最下面，需捲動查看 -->
    <div class="info-area">
        <h2 class="sr-only">視覺與設定區塊，建議明眼人協助</h2>
        
        <video id="video" autoplay playsinline aria-hidden="true"></video>
        <canvas id="canvas" style="display:none;" aria-hidden="true"></canvas>

        <div id="response" role="region" aria-live="assertive" tabindex="0">
            結果將顯示在此。
        </div>

        <div class="api-section">
            <p style="color:#aaa; font-size:1rem; margin-bottom:10px;">請明眼人協助設定 API 金鑰</p>
            <a href="https://aistudio.google.com/api-keys" target="_blank" class="api-link" id="apiLink">取得 Gemini API 金鑰 (另開分頁)</a>   
            <label for="apiKey">API 金鑰：</label>
            <input type="password" id="apiKey" placeholder="請貼上金鑰" aria-required="true">
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const switchCameraBtn = document.getElementById('switchCameraBtn');
        const mainActionBtn = document.getElementById('mainActionBtn');
        const speakBtn = document.getElementById('speakBtn');
        const stopBtn = document.getElementById('stopBtn');
        const status = document.getElementById('status');
        const responseDiv = document.getElementById('response');
        const apiKeyInput = document.getElementById('apiKey');
        const apiLink = document.getElementById('apiLink');

        let lastResponse = '';
        let apiKey = '';
        let currentFacingMode = 'environment'; 
        let videoStream = null;
        let apiReminderInterval = null; 
        
        const modelName = 'gemini-2.5-flash';
        const SYSTEM_PROMPT = "我是視覺障礙者，幫我辨識這張圖片有什麼? 請直接用繁體中文描述畫面內容，語氣自然且具體，並保持簡短（三句話以內），不要加入任何Markdown語法（如星號）或多餘的問候語。";

        function speak(text, priority = false) {
            if (priority) window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW';
            utterance.rate = 1.1; 
            window.speechSynthesis.speak(utterance);
        }

        function stopApiReminder() {
            if (apiReminderInterval) {
                clearInterval(apiReminderInterval);
                apiReminderInterval = null;
            }
        }

        // 焦點語音提示
        mainActionBtn.addEventListener('focus', () => speak('拍照並辨識，主按鈕'));
        speakBtn.addEventListener('focus', () => speak('重聽結果按鈕'));
        stopBtn.addEventListener('focus', () => speak('停止朗讀按鈕'));
        switchCameraBtn.addEventListener('focus', () => speak('切換鏡頭按鈕'));
        apiKeyInput.addEventListener('focus', () => {
            stopApiReminder();
            speak('輸入框，請貼上 API 金鑰');
        });

        stopBtn.addEventListener('click', () => {
            window.speechSynthesis.cancel();
            stopApiReminder();
            speak('已停止', true);
            updateStatus('已停止', 'success');
        });

        speakBtn.addEventListener('click', () => {
            if (lastResponse) {
                speak('重新朗讀：', true);
                speak(lastResponse);
            } else {
                speak('目前沒有結果', true);
            }
        });

        function updateStatus(text, type = '') {
            status.textContent = text;
            status.className = type;
        }

        async function initWebcam(facingMode) {
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
            }
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: facingMode } 
                });
                video.srcObject = videoStream;
                const modeText = facingMode === 'user' ? '前置自拍' : '後置主';
                updateStatus(`相機就緒 (${modeText})`, 'success');
                setTimeout(() => speak(`已開啟${modeText}鏡頭。點擊畫面上半部最大區域進行拍照。`, true), 1000);
            } catch (err) {
                updateStatus('相機錯誤', 'error');
                speak('相機啟動失敗', true);
            }
        }

        switchCameraBtn.addEventListener('click', () => {
            currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
            speak('切換鏡頭中', true);
            initWebcam(currentFacingMode);
        });

        apiKeyInput.addEventListener('input', (e) => {
            apiKey = e.target.value.trim();
            if (apiKey) stopApiReminder();
        });

        mainActionBtn.addEventListener('click', async () => {
            if (!apiKey) {
                const errorMsg = '未設定 API 金鑰。請將手機交給明眼人，滑到網頁最下方設定。';
                speak(errorMsg, true);
                stopApiReminder();
                apiReminderInterval = setInterval(() => {
                    if (!apiKey) {
                        speak('提醒：缺少 API 金鑰。請明眼人協助滑到底部設定。', false);
                    } else {
                        stopApiReminder();
                    }
                }, 15000);
                apiKeyInput.scrollIntoView({ behavior: 'smooth' });
                return;
            }
            
            stopApiReminder();
            speak('喀擦！分析中，請稍候。', true);
            mainActionBtn.disabled = true;
            updateStatus('分析中...', 'loading');
            responseDiv.textContent = '思考中...';

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const capturedImage = canvas.toDataURL('image/jpeg', 0.85);
            const base64Data = capturedImage.split(',')[1];

            const payload = {
                contents: [{
                    parts: [
                        { text: SYSTEM_PROMPT },
                        { inline_data: { mime_type: 'image/jpeg', data: base64Data } }
                    ]
                }],
                generationConfig: { temperature: 0.4, maxOutputTokens: 1024 }
            };

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error('API Error');

                const data = await response.json();
                lastResponse = data.candidates?.[0]?.content?.parts?.[0]?.text || '無法解析內容';
                
                responseDiv.textContent = lastResponse;
                updateStatus('分析完成', 'success');
                
                speak('結果是：', true);
                speak(lastResponse);
                
            } catch (err) {
                responseDiv.textContent = '錯誤';
                updateStatus('發生錯誤', 'error');
                speak('網路或分析錯誤，請重試。', true);
            } finally {
                mainActionBtn.disabled = false;
            }
        });

        initWebcam('environment');
    </script>
</body>
</html>
