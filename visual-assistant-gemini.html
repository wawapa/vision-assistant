<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>視覺語音助理</title>
    <style>
        /* 高對比與無障礙樣式設定 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #121212;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            font-size: 18px;
        }
        
        /* 增強鍵盤操作的視覺焦點 */
        *:focus {
            outline: 6px solid #ffbf00 !important;
            outline-offset: 4px;
        }

        h1 { margin-bottom: 15px; color: #4fc3f7; font-size: 1.8rem; text-align: center; }
        
        main {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 800px;
            width: 100%;
        }

        .card {
            background: #1e1e1e;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 20px;
            width: 100%;
        }

        /* 影片預覽區域 */
        video {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 8px;
            background: #000;
            border: 2px solid #4fc3f7;
            margin-bottom: 15px;
        }

        /* 超大主按鈕設計，方便盲按 */
        #mainActionBtn {
            background: #ffeb3b; /* 高對比亮黃色 */
            color: #000000;
            font-size: 2.5rem;
            font-weight: 900;
            padding: 40px 20px;
            min-height: 200px; /* 極大高度 */
            width: 100%;
            border: 6px solid #f57f17;
            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            margin: 10px 0;
        }
        
        #mainActionBtn:active {
            transform: scale(0.96);
            background: #fdd835;
        }

        #mainActionBtn:disabled { 
            background: #555; 
            color: #888;
            border-color: #444;
            cursor: not-allowed; 
        }

        .audio-controls { display: flex; gap: 15px; margin-top: 15px; }
        .audio-controls button { 
            flex: 1; 
            padding: 20px; 
            font-size: 1.3rem; 
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #speakBtn { background: #81c784; color: #000; }
        #stopBtn { background: #e57373; color: #000; }
        .audio-controls button:disabled { opacity: 0.4; }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #ffb74d;
            font-size: 1.2rem;
        }

        input[type="password"] {
            width: 100%;
            padding: 16px;
            border: 2px solid #666;
            border-radius: 8px;
            background: #2c2c2c;
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        #status {
            margin-top: 10px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
        }

        .loading { background: #ffb74d; color: #000; }
        .error { background: #ef5350; color: #fff; }
        .success { background: #66bb6a; color: #000; }

        #response {
            margin-top: 15px;
            min-height: 120px;
            padding: 20px;
            background: #2c2c2c;
            border-radius: 8px;
            white-space: pre-wrap;
            font-size: 1.3rem;
            line-height: 1.6;
            border: 2px solid #555;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }
        
        .api-link {
            color: #4fc3f7;
            font-size: 1.2rem;
            display: block;
            margin-bottom: 15px;
            padding: 10px 0;
        }
    </style>
</head>
<body>
    <main>
        <h1>視覺語音助理</h1>

        <!-- API 金鑰設定區 -->
        <section class="card" aria-labelledby="settings-heading">
            <h2 id="settings-heading" class="sr-only">系統設定</h2>
            <a href="https://aistudio.google.com/api-keys" target="_blank" class="api-link" aria-label="取得 API 金鑰，將開啟新分頁" id="apiLink">取得 Gemini API 金鑰 (另開分頁)</a>   
            <label for="apiKey">API 金鑰：</label>
            <input type="password" id="apiKey" placeholder="請輸入您的金鑰" aria-required="true">
        </section>

        <!-- 主要操作區 -->
        <section class="card" aria-labelledby="camera-heading">
            <h2 id="camera-heading" class="sr-only">相機與辨識操作區</h2>
            
            <video id="video" autoplay playsinline aria-hidden="true"></video>
            <canvas id="canvas" style="display:none;" aria-hidden="true"></canvas>
            
            <div id="status" role="status" aria-live="polite">相機啟動中...</div>

            <!-- 合併後的超大按鈕 -->
            <button id="mainActionBtn" aria-label="拍下眼前畫面並開始語音辨識">拍照並辨識</button>

            <div class="audio-controls">
                <button id="speakBtn" disabled aria-label="重新朗讀辨識結果">🔊 重聽結果</button>
                <button id="stopBtn" aria-label="停止目前所有語音">⏹️ 停止朗讀</button>
            </div>
            
            <div id="response" role="region" aria-live="assertive" tabindex="0">
                結果將顯示在此。
            </div>
        </section>
    </main>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const mainActionBtn = document.getElementById('mainActionBtn');
        const speakBtn = document.getElementById('speakBtn');
        const stopBtn = document.getElementById('stopBtn');
        const status = document.getElementById('status');
        const responseDiv = document.getElementById('response');
        const apiKeyInput = document.getElementById('apiKey');
        const apiLink = document.getElementById('apiLink');

        let lastResponse = '';
        let apiKey = '';
        const modelName = 'gemini-2.5-flash';
        
        // 固定的內部提示詞
        const SYSTEM_PROMPT = "我是視覺障礙者，幫我辨識這張圖片有什麼? 請直接用繁體中文描述畫面內容，語氣自然且具體，並保持簡短（三句話以內），不要加入任何Markdown語法（如星號）或多餘的問候語。";

        // --- 語音功能 ---
        function speak(text, priority = false) {
            if (priority) window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW';
            utterance.rate = 1.1; 
            window.speechSynthesis.speak(utterance);
        }

        // --- 互動語音提示 (焦點與點擊) ---
        // 為了讓盲人知道自己目前滑到哪裡，當元素獲得焦點(Focus)時給予語音提示
        apiLink.addEventListener('focus', () => speak('取得API金鑰連結，點擊將開啟新分頁'));
        apiKeyInput.addEventListener('focus', () => speak('密碼輸入框，請輸入 API 金鑰'));
        mainActionBtn.addEventListener('focus', () => speak('拍照並辨識，主要按鈕'));
        speakBtn.addEventListener('focus', () => speak('重聽結果按鈕'));
        stopBtn.addEventListener('focus', () => speak('停止朗讀按鈕'));

        // 停止語音
        stopBtn.addEventListener('click', () => {
            window.speechSynthesis.cancel();
            speak('已停止朗讀', true);
            updateStatus('已停止朗讀', 'success');
        });

        // 重聽結果
        speakBtn.addEventListener('click', () => {
            if (lastResponse) {
                speak('重新朗讀：', true);
                speak(lastResponse);
            } else {
                speak('目前沒有結果可以朗讀', true);
            }
        });

        function updateStatus(text, type = '') {
            status.textContent = text;
            status.className = type;
        }

        async function initWebcam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                video.srcObject = stream;
                updateStatus('相機就緒，可以隨時拍照。', 'success');
                // 延遲一點點說，避免網頁剛載入時語音被截斷
                setTimeout(() => speak('系統已準備就緒，請觸摸畫面中間的超大按鈕進行拍照辨識。', true), 1000);
            } catch (err) {
                updateStatus('無法存取相機', 'error');
                speak('相機啟動失敗，請檢查權限設定', true);
            }
        }

        apiKeyInput.addEventListener('input', (e) => {
            apiKey = e.target.value.trim();
        });

        // --- 核心功能：合併拍照與辨識 ---
        mainActionBtn.addEventListener('click', async () => {
            if (!apiKey) {
                speak('請先在畫面上方輸入 API 金鑰', true);
                apiKeyInput.focus();
                return;
            }
            
            // 1. 給予即時語音回饋，並鎖定按鈕
            speak('喀擦！已拍照，正在為您分析畫面，請稍候。', true);
            mainActionBtn.disabled = true;
            speakBtn.disabled = true;
            updateStatus('正在分析圖片，請稍候...', 'loading');
            responseDiv.textContent = '系統思考中...';

            // 2. 擷取畫面
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const capturedImage = canvas.toDataURL('image/jpeg', 0.85);
            const base64Data = capturedImage.split(',')[1];

            // 3. 呼叫 API
            const payload = {
                contents: [{
                    parts: [
                        { text: SYSTEM_PROMPT },
                        { inline_data: { mime_type: 'image/jpeg', data: base64Data } }
                    ]
                }],
                generationConfig: {
                    temperature: 0.4, 
                    maxOutputTokens: 1024
                }
            };

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || `API 錯誤`);
                }

                const data = await response.json();
                lastResponse = data.candidates?.[0]?.content?.parts?.[0]?.text || '無法解析畫面內容';
                
                // 4. 完成後的處理
                responseDiv.textContent = lastResponse;
                speakBtn.disabled = false;
                updateStatus('分析完成！', 'success');
                
                // 自動朗讀結果
                speak('分析完成，結果是：', true);
                speak(lastResponse);
                
                // 將焦點移至結果區，讓螢幕閱讀器能抓到
                responseDiv.focus();

            } catch (err) {
                responseDiv.textContent = '發生錯誤：' + err.message;
                updateStatus('發生錯誤', 'error');
                speak('很抱歉，網路或分析過程發生錯誤，請稍後再試。', true);
            } finally {
                mainActionBtn.disabled = false;
            }
        });

        // 初始化
        initWebcam();
    </script>
</body>
</html>
